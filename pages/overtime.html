<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RDR HR — File Overtime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --navy-900: #0a1628;
            --navy-700: #1a2744;
            --amber-50: #eef2ff;
            --amber-100: #dbeafe;
            --amber-200: #bfdbfe;
            --amber-400: #3b82f6;
            --amber-500: #1a3a6c;
            --amber-600: #132d56;
            --amber-700: #0f2140;
            --amber-800: #0a1628;
            --orange-500: #2563eb;
            --orange-600: #1d4ed8;
            --green-500: #22c55e;
            --green-600: #16a34a;
            --green-50: #f0fdf4;
            --red-50: #fef2f2;
            --red-500: #ef4444;
            --red-600: #dc2626;
            --blue-50: #eff6ff;
            --blue-500: #3b82f6;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --white: #ffffff;
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 16px;
            --r-xl: 20px;
            --r-full: 9999px;
            --sp-xs: 4px;
            --sp-sm: 8px;
            --sp-md: 12px;
            --sp-lg: 16px;
            --sp-xl: 24px;
            --sp-2xl: 32px;
        }

        /* â”€â”€ DARK MODE â”€â”€ */
        [data-theme="dark"] {
            --bg-card: #162032;
            --bg-input: #0d1b2a;
            --navy-900: #0a1628;
            --navy-800: #0f2140;
            --navy-700: #132d56;
            --gray-50: #0d1b2a;
            --gray-100: #162032;
            --gray-200: #1e3050;
            --gray-300: #475569;
            --gray-400: #64748b;
            --gray-500: #94a3b8;
            --gray-600: #94a3b8;
            --gray-700: #cbd5e1;
            --gray-800: #e2e8f0;
            --gray-900: #e2e8f0;
            --shadow-dark: rgba(0, 0, 0, 0.5);
            --green-50: #0a2618;
            --red-50: #2a0f0f;
            --blue-50: #0f1a2e;
            --amber-50: #2a1f0a;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            -webkit-font-smoothing: antialiased;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--gray-50);
        }

        .app-header {
            background: linear-gradient(135deg, var(--amber-800) 0%, var(--amber-600) 60%, var(--orange-500) 100%);
            color: #ffffff;
            padding: var(--sp-lg) var(--sp-xl);
            box-shadow: 0 4px 20px rgba(10, 22, 40, 0.3);
            position: relative;
            z-index: 100;
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: var(--sp-lg);
        }

        .header-logo {
            width: 48px;
            height: 48px;
            background: #ffffff;
            border-radius: var(--r-md);
            padding: 6px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header-text {
            flex: 1;
            min-width: 0;
        }

        .header-title {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .header-datetime {
            font-size: 0.72rem;
            opacity: 0.75;
            margin-top: 2px;
        }

        .app-body {
            flex: 1;
            overflow-y: auto;
            padding: var(--sp-xl);
            -webkit-overflow-scrolling: touch;
        }

        .body-inner {
            max-width: 700px;
            margin: 0 auto;
        }

        /* FORM CARD */
        .form-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: var(--r-xl);
            border: 1px solid var(--gray-200);
            box-shadow: 0 16px 48px rgba(217, 119, 6, 0.12), 0 4px 12px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .form-header {
            background: linear-gradient(135deg, var(--amber-600), var(--orange-500));
            padding: 20px 24px;
            text-align: center;
            color: var(--white);
        }

        .form-header h2 {
            font-size: 1.15rem;
            font-weight: 800;
        }

        .form-header p {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 4px;
        }

        .form-body {
            padding: 24px;
        }

        .emp-info-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--amber-50);
            border: 1px solid var(--amber-200);
            border-radius: var(--r-md);
            padding: 14px 18px;
            margin-bottom: 20px;
        }

        .emp-avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--r-full);
            background: linear-gradient(135deg, var(--amber-500), var(--orange-500));
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .emp-details {
            flex: 1;
        }

        .emp-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gray-800);
        }

        .emp-id {
            font-size: 0.72rem;
            color: var(--gray-500);
            margin-top: 2px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray-600);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--r-md);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--gray-800);
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--bg-card);
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #1a3a6c;
            box-shadow: 0 0 0 3px rgba(26, 58, 108, 0.2);
        }

        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--r-md);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--gray-800);
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--bg-card);
            min-height: 80px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--r-md);
            background: #1a3a6c;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(26, 58, 108, 0.4);
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 58, 108, 0.5);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* HISTORY */
        .history-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: var(--r-xl);
            border: 1px solid var(--gray-200);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .history-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-header h3 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gray-800);
        }

        .history-count {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--gray-400);
            background: var(--gray-100);
            padding: 3px 10px;
            border-radius: var(--r-full);
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th {
            background: var(--gray-50);
            text-align: left;
            padding: 10px 16px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .history-table td {
            padding: 12px 16px;
            font-size: 0.8rem;
            color: var(--gray-700);
            border-top: 1px solid var(--gray-100);
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: var(--r-full);
            font-size: 0.68rem;
            font-weight: 700;
        }

        .status-badge.pending {
            background: var(--amber-100);
            color: var(--amber-700);
        }

        .status-badge.approved {
            background: var(--green-50);
            color: var(--green-600);
        }

        .status-badge.disapproved {
            background: var(--red-50);
            color: var(--red-600);
        }

        .empty-history {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-400);
            font-size: 0.85rem;
        }

        .empty-history-icon {
            font-size: 2rem;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        /* OVERLAYS */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 22, 40, 0.92);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-content {
            text-align: center;
            color: var(--white);
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: var(--amber-400);
            border-radius: var(--r-full);
            animation: spin 0.7s linear infinite;
            margin: 0 auto var(--sp-lg);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 0.95rem;
            font-weight: 500;
            opacity: 0.85;
        }

        .msg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 22, 40, 0.65);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            cursor: pointer;
        }

        .msg-overlay.active {
            display: flex;
        }

        .msg-card {
            background: var(--bg-card);
            border-radius: var(--r-xl);
            padding: 32px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .msg-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--r-full);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 1.5rem;
        }

        .msg-icon.success {
            background: #ecfdf5;
            color: #059669;
        }

        .msg-icon.error {
            background: #fef2f2;
            color: #dc2626;
        }

        .msg-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 4px;
        }

        .msg-text {
            font-size: 0.85rem;
            color: var(--gray-500);
            line-height: 1.5;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .app-header {
                padding: var(--sp-sm) var(--sp-md);
            }

            .header-inner {
                gap: 10px;
            }

            .header-logo {
                width: 36px;
                height: 36px;
            }

            .header-title {
                font-size: 1.1rem;
            }

            .header-datetime {
                font-size: 0.65rem;
            }

            .app-body {
                padding: var(--sp-md);
            }

            .form-body {
                padding: 18px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .emp-info-bar {
                flex-direction: column;
                text-align: center;
            }

            .history-card {
                overflow-x: auto;
            }

            .history-table {
                min-width: 480px;
            }
        }

        @media (max-width: 480px) {
            .app-header {
                padding: var(--sp-xs) var(--sp-sm);
            }

            .header-title {
                font-size: 0.95rem;
            }

            .app-body {
                padding: var(--sp-sm);
            }

            .form-body {
                padding: 14px;
            }

            .form-header {
                padding: 16px;
            }

            .form-header h2 {
                font-size: 1rem;
            }
        }

        /* â”€â”€ THEME TOGGLE â”€â”€ */
        .theme-toggle {
            margin-left: auto;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            color: #fff;
            padding: 0;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* â”€â”€ DARK MODE CONTENT OVERRIDES â”€â”€ */
        [data-theme="dark"] .scan-card,
        [data-theme="dark"] .profile-bar,
        [data-theme="dark"] .records-panel,
        [data-theme="dark"] .actions-panel,
        [data-theme="dark"] .form-card,
        [data-theme="dark"] .overlay-card,
        [data-theme="dark"] .msg-box,
        [data-theme="dark"] .filing-card,
        [data-theme="dark"] .section-panel,
        [data-theme="dark"] .confirm-card,
        [data-theme="dark"] .table-card {
            background: #162032 !important;
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .scan-title,
        [data-theme="dark"] .form-title,
        [data-theme="dark"] .panel-title,
        [data-theme="dark"] .section-title,
        [data-theme="dark"] h2,
        [data-theme="dark"] h3 {
            color: #e2e8f0 !important;
        }

        [data-theme="dark"] .scan-subtitle,
        [data-theme="dark"] .form-subtitle,
        [data-theme="dark"] .input-label,
        [data-theme="dark"] label {
            color: #94a3b8 !important;
        }

        [data-theme="dark"] .card-input,
        [data-theme="dark"] .form-input,
        [data-theme="dark"] .form-select,
        [data-theme="dark"] select,
        [data-theme="dark"] .form-textarea,
        [data-theme="dark"] input[type="text"],
        [data-theme="dark"] input[type="date"],
        [data-theme="dark"] input[type="time"],
        [data-theme="dark"] input[type="number"],
        [data-theme="dark"] input[type="email"],
        [data-theme="dark"] textarea {
            background: #0d1b2a !important;
            border-color: #1e3050 !important;
            color: #e2e8f0 !important;
        }

        [data-theme="dark"] .card-input::placeholder,
        [data-theme="dark"] input::placeholder,
        [data-theme="dark"] textarea::placeholder {
            color: #475569 !important;
        }

        [data-theme="dark"] .submit-btn,
        [data-theme="dark"] .form-btn {
            color: #ffffff !important;
        }

        [data-theme="dark"] .credits-label,
        [data-theme="dark"] .credits-sub,
        [data-theme="dark"] .rtable td,
        [data-theme="dark"] td,
        [data-theme="dark"] th {
            color: #cbd5e1 !important;
        }

        [data-theme="dark"] .status-pill,
        [data-theme="dark"] .badge {
            opacity: 0.9;
        }

        [data-theme="dark"] .loading-overlay {
            background: rgba(0, 0, 0, 0.92) !important;
        }

        [data-theme="dark"] .msg-overlay {
            background: rgba(0, 0, 0, 0.7) !important;
        }

        [data-theme="dark"] .overlay-bg {
            background: rgba(0, 0, 0, 0.7) !important;
        }

        [data-theme="dark"] .action-btn,
        [data-theme="dark"] .att-btn {
            background: #1e3050 !important;
            border-color: #2a4060 !important;
            color: #cbd5e1 !important;
        }

        [data-theme="dark"] .action-btn.active,
        [data-theme="dark"] .att-btn.active {
            border-color: #3b82f6 !important;
        }

        [data-theme="dark"] .action-btn .btn-label,
        [data-theme="dark"] .att-btn .btn-label {
            color: #94a3b8 !important;
        }

        [data-theme="dark"] .profile-name {
            color: #e2e8f0 !important;
        }

        [data-theme="dark"] .profile-meta,
        [data-theme="dark"] .profile-id {
            color: #64748b !important;
        }

        [data-theme="dark"] .stat-value,
        [data-theme="dark"] .stat-label,
        [data-theme="dark"] .last-action {
            color: #94a3b8 !important;
        }

        [data-theme="dark"] .stat-value {
            color: #e2e8f0 !important;
        }

        [data-theme="dark"] .footer-bar,
        [data-theme="dark"] [class*="footer"] {
            background: #0d1b2a !important;
            border-color: #1e3050 !important;
            color: #64748b !important;
        }

        [data-theme="dark"] .p-arrow {
            background: #162032 !important;
            border-color: #1e3050 !important;
            color: #94a3b8 !important;
        }

        [data-theme="dark"] .rtable {
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .rtable th {
            background: #0f2140 !important;
            border-color: #1e3050 !important;
            color: #94a3b8 !important;
        }

        [data-theme="dark"] .rtable td {
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .rtable tr:hover td {
            background: rgba(26, 58, 108, 0.15) !important;
        }

        [data-theme="dark"] .date-row td {
            background: #0f2140 !important;
            color: #93c5fd !important;
        }

        [data-theme="dark"] .empty-state,
        [data-theme="dark"] .no-data {
            color: #64748b !important;
        }

        [data-theme="dark"] .no-account-card {
            background: #162032 !important;
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .data-table th {
            background: #0f2140 !important;
            color: #94a3b8 !important;
        }

        [data-theme="dark"] .data-table td {
            color: #cbd5e1 !important;
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .section-header {
            background: #162032 !important;
        }

        [data-theme="dark"] .filter-group select,
        [data-theme="dark"] .filter-select {
            background: #0d1b2a !important;
            border-color: #1e3050 !important;
            color: #e2e8f0 !important;
        }

        [data-theme="dark"] .action-bar {
            background: #162032 !important;
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .filing-summary-card,
        [data-theme="dark"] .summary-card {
            background: #162032 !important;
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .info-row,
        [data-theme="dark"] .detail-row {
            color: #cbd5e1 !important;
        }

        [data-theme="dark"] .workspace-timer,
        [data-theme="dark"] .timer-card {
            background: #162032 !important;
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .history-row,
        [data-theme="dark"] .filing-row {
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .history-row:hover,
        [data-theme="dark"] .filing-row:hover {
            background: rgba(26, 58, 108, 0.1) !important;
        }

        /* â”€â”€ HEADER RESPONSIVE (mobile fix) â”€â”€ */
        @media (max-width: 480px) {
            .header-inner {
                gap: 8px !important;
                padding: 0 !important;
                flex-wrap: nowrap;
            }

            .header-logo {
                width: 32px !important;
                height: 32px !important;
                min-width: 32px !important;
                border-radius: 8px !important;
            }

            .header-logo img {
                width: 100% !important;
                height: 100% !important;
            }

            .header-titles h1,
            .header-title {
                font-size: 0.82rem !important;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 140px;
            }

            .header-sub,
            .header-datetime {
                font-size: 0.6rem !important;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 140px;
            }

            .theme-toggle {
                width: 30px !important;
                height: 30px !important;

<body>

    <!-- OVERLAYS -->
    <div class="loading-overlay" id="loadingOverlay">

    <div class="msg-overlay" id="msgOverlay">
        <div class="msg-card">
            <div class="msg-icon" id="msgIcon">✓</div>

    <script>
        var USER_EMAIL = '' + RDR_AUTH.getEmail() + '';
        var SESSION_TOKEN = '' + RDR_AUTH.getSession() + '';
        var BASE_URL = '' + RDR_AUTH.getGasUrl() + '';

        var currentEmployee = null;

        // Clock
        function updateClock() {
            var now = new Date();
            var opts = { timeZone: 'Asia/Manila', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('headerDateTime').textContent = now.toLocaleString('en-PH', opts);
        }

        // Init
        document.addEventListener('DOMContentLoaded', function () {
            updateClock();
            setInterval(updateClock, 1000);

            document.getElementById('backToPortal').setAttribute('data-url', './');
            document.getElementById('msgOverlay').addEventListener('click', hideMsgOverlay);

            // Lookup employee
            callGAS('split', [',']).then(function (result) {
                    if (result && result.success && result.employee) {
                        currentEmployee = result.employee;
                        var emp = result.employee;
                        var names = emp.empName.split(','););
                        var initials = (names.length >= 2) ? names[1].trim().charAt(0) + names[0].trim().charAt(0) : emp.empName.substring(0, 2);
                        document.getElementById('empAvatar').textContent = initials.toUpperCase();
                        document.getElementById('empName').textContent = emp.empName;
                        document.getElementById('empId').textContent = 'ID: ' + emp.empId;
                        document.getElementById('empBar').style.display = 'flex';
                        document.getElementById('submitBtn').disabled = false;
                    }
                })
                .withFailureHandler(function () { })
                .lookupEmployeeByEmail(USER_EMAIL);

            loadHistory();
        });

        function loadHistory() {
            callGAS('getElementById', ['historyTbody']).then(function (result) {
                    if (!result || !result.success) return;
                    var filings = result.filings || [];
                    document.getElementById('historyCount').textContent = filings.length;
                    if (filings.length === 0) {
                        document.getElementById('emptyHistory').style.display = 'block';
                        document.getElementById('historyTable').style.display = 'none';
                        return;
                    }
                    document.getElementById('emptyHistory').style.display = 'none';
                    document.getElementById('historyTable').style.display = 'table';
                    var tbody = document.getElementById('historyTbody'););
                    tbody.innerHTML = '';
                    for (var i = filings.length - 1; i >= 0; i--) {
                        var f = filings[i];
                        var statusClass = String(f.status).toLowerCase() === 'approved' ? 'approved' : (String(f.status).toLowerCase() === 'disapproved' ? 'disapproved' : 'pending');
                        var tr = document.createElement('tr');
                        var remarksShort = String(f.remarks || '').substring(0, 25) + (String(f.remarks || '').length > 25 ? '...' : '');
                        var typeShort = String(f.type || '').replace(' Overtime', '');
                        tr.innerHTML = '<td>' + typeShort + '</td><td>' + f.date + '</td><td>' + f.timeIn + '</td><td>' + f.timeOut + '</td><td>' + remarksShort + '</td><td><span class="status-badge ' + statusClass + '">' + f.status + '</span></td>';
                        tbody.appendChild(tr);
                    }
                })
                .withFailureHandler(function () { })
                .getMyOvertimeFilings(USER_EMAIL);
        }

        function submitForm() {
            if (!currentEmployee) return;
            var otType = document.getElementById('otType').value;
            var date = document.getElementById('otDate').value;
            var timeIn = document.getElementById('otTimeIn').value;
            var timeOut = document.getElementById('otTimeOut').value;
            var remarks = document.getElementById('otRemarks').value;

            if (!otType) {
                showMessage('error', 'Missing Field', 'Please select the type of overtime.');
                return;
            }
            if (!date || !timeIn || !timeOut || !remarks.trim()) {
                showMessage('error', 'Missing Fields', 'Please fill in all fields including remarks.');
                return;
            }

            showLoading('Submitting overtime filing...');
            document.getElementById('submitBtn').disabled = true;

            callGAS('submitOvertime', [currentEmployee.empId, currentEmployee.empName, otType, date, timeIn, timeOut, remarks]).then(function (result) {
                    hideLoading();
                    if (result && result.success) {
                        showMessage('success', 'Submitted!', result.message);
                        document.getElementById('otType').value = '';
                        document.getElementById('otDate').value = '';
                        document.getElementById('otTimeIn').value = '';
                        document.getElementById('otTimeOut').value = '';
                        document.getElementById('otRemarks').value = '';
                        loadHistory();
                    } else {
                        showMessage('error', 'Failed', result.error);
                    }
                    document.getElementById('submitBtn').disabled = false;
                }).catch(function (err) {
                    hideLoading();
                    showMessage('error', 'Error', err.message || 'Server error.');
                    document.getElementById('submitBtn').disabled = false;
                });
        }

        function showLoading(text) { document.getElementById('loadingText').textContent = text || 'Processing...'; document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        function showMessage(type, title, text) {
            var icon = document.getElementById('msgIcon');
            icon.className = 'msg-icon ' + type;
            icon.textContent = type === 'success' ? '✓' : '✕';
            document.getElementById('msgTitle').textContent = title;
            document.getElementById('msgText').textContent = text;
            document.getElementById('msgOverlay').classList.add('active');
        }
        function hideMsgOverlay() { document.getElementById('msgOverlay').classList.remove('active'); }
        // â”€â”€ THEME TOGGLE â”€â”€
        (function () {
            var LOGO_LIGHT = 'https://i.ibb.co/zVsd2Mgk/RDR-Business-Solutions-proper-Blue.png';
            var LOGO_DARK = 'https://i.ibb.co/6crnBjPv/RDR-Logo-White.png';
            var saved = 'light';
            try { saved = localStorage.getItem('rdr-theme') || 'light'; } catch (e) { }
            document.documentElement.setAttribute('data-theme', saved);
            function updateIcon() {
                var el = document.getElementById('themeIcon');
                if (!el) return;
                var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                el.innerHTML = isDark
                    ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'
                    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
                var logo = document.getElementById('headerLogo');
                if (logo) logo.src = isDark ? LOGO_DARK : LOGO_LIGHT;
            }
            updateIcon();
            var btn = document.getElementById('themeToggle');
            if (btn) btn.addEventListener('click', function () {
                var current = document.documentElement.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                try { localStorage.setItem('rdr-theme', next); } catch (e) { }
                updateIcon();
            });
        })();
    </script>
