<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RDR HR — WFH Filing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --navy-900: #0a1628;
            --teal-50: #eef2ff;
            --teal-100: #dbeafe;
            --teal-200: #bfdbfe;
            --teal-400: #3b82f6;
            --teal-500: #1a3a6c;
            --teal-600: #132d56;
            --teal-700: #0f2140;
            --teal-800: #0a1628;
            --cyan-400: #2563eb;
            --green-50: #f0fdf4;
            --green-600: #16a34a;
            --amber-100: #fef3c7;
            --amber-700: #b45309;
            --red-50: #fef2f2;
            --red-500: #ef4444;
            --red-600: #dc2626;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --white: #ffffff;
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 16px;
            --r-xl: 20px;
            --r-full: 9999px;
            --sp-xs: 4px;
            --sp-sm: 8px;
            --sp-md: 12px;
            --sp-lg: 16px;
            --sp-xl: 24px;
        }

        /* ── DARK MODE ── */
        [data-theme="dark"] {
            --bg-card: #162032;
            --bg-input: #0d1b2a;
            --navy-900: #0a1628;
            --navy-800: #0f2140;
            --navy-700: #132d56;
            --gray-50: #0d1b2a;
            --gray-100: #162032;
            --gray-200: #1e3050;
            --gray-300: #475569;
            --gray-400: #64748b;
            --gray-500: #94a3b8;
            --gray-600: #94a3b8;
            --gray-700: #cbd5e1;
            --gray-800: #e2e8f0;
            --gray-900: #e2e8f0;
            --shadow-dark: rgba(0, 0, 0, 0.5);
            --green-50: #0a2618;
            --red-50: #2a0f0f;
            --blue-50: #0f1a2e;
            --amber-50: #2a1f0a;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            -webkit-font-smoothing: antialiased;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--gray-50);
        }

        .app-header {
            background: linear-gradient(135deg, var(--teal-800) 0%, var(--teal-600) 60%, var(--teal-400) 100%);
            color: #ffffff;
            padding: var(--sp-lg) var(--sp-xl);
            box-shadow: 0 4px 20px rgba(10, 22, 40, 0.3);
            position: relative;
            z-index: 100;
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: var(--sp-lg);
        }

        .header-logo {
            width: 48px;
            height: 48px;
            background: #ffffff;
            border-radius: var(--r-md);
            padding: 6px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header-text {
            flex: 1;
            min-width: 0;
        }

        .header-title {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .header-datetime {
            font-size: 0.72rem;
            opacity: 0.75;
            margin-top: 2px;
        }

        .app-body {
            flex: 1;
            overflow-y: auto;
            padding: var(--sp-xl);
            -webkit-overflow-scrolling: touch;
        }

        .body-inner {
            max-width: 700px;
            margin: 0 auto;
        }

        .form-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: var(--r-xl);
            border: 1px solid var(--gray-200);
            box-shadow: 0 16px 48px rgba(13, 148, 136, 0.12), 0 4px 12px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .form-header {
            background: linear-gradient(135deg, var(--teal-600), var(--teal-400));
            padding: 20px 24px;
            text-align: center;
            color: var(--white);
        }

        .form-header h2 {
            font-size: 1.15rem;
            font-weight: 800;
        }

        .form-header p {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 4px;
        }

        .form-body {
            padding: 24px;
        }

        .emp-info-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--teal-50);
            border: 1px solid var(--teal-200);
            border-radius: var(--r-md);
            padding: 14px 18px;
            margin-bottom: 20px;
        }

        .emp-avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--r-full);
            background: linear-gradient(135deg, var(--teal-500), var(--cyan-400));
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .emp-details {
            flex: 1;
        }

        .emp-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gray-800);
        }

        .emp-id {
            font-size: 0.72rem;
            color: var(--gray-500);
            margin-top: 2px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray-600);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--r-md);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--gray-800);
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--bg-card);
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--teal-500);
            box-shadow: 0 0 0 3px rgba(26, 58, 108, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--r-md);
            background: var(--teal-500);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(26, 58, 108, 0.4);
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(20, 184, 166, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .history-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: var(--r-xl);
            border: 1px solid var(--gray-200);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .history-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-header h3 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gray-800);
        }

        .history-count {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--gray-400);
            background: var(--gray-100);
            padding: 3px 10px;
            border-radius: var(--r-full);
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th {
            background: var(--gray-50);
            text-align: left;
            padding: 10px 16px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--gray-500);
            text-transform: uppercase;
        }

        .history-table td {
            padding: 12px 16px;
            font-size: 0.8rem;
            color: var(--gray-700);
            border-top: 1px solid var(--gray-100);
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: var(--r-full);
            font-size: 0.68rem;
            font-weight: 700;
        }

        .status-badge.pending {
            background: var(--amber-100);
            color: var(--amber-700);
        }

        .status-badge.approved {
            background: var(--green-50);
            color: var(--green-600);
        }

        .status-badge.disapproved {
            background: var(--red-50);
            color: var(--red-600);
        }

        .empty-history {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-400);
            font-size: 0.85rem;
        }

        .empty-history-icon {
            font-size: 2rem;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 22, 40, 0.92);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-content {
            text-align: center;
            color: var(--white);
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: var(--teal-400);
            border-radius: var(--r-full);
            animation: spin 0.7s linear infinite;
            margin: 0 auto var(--sp-lg);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 0.95rem;
            font-weight: 500;
            opacity: 0.85;
        }

        .msg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 22, 40, 0.65);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            cursor: pointer;
        }

        .msg-overlay.active {
            display: flex;
        }

        .msg-card {
            background: var(--bg-card);
            border-radius: var(--r-xl);
            padding: 32px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .msg-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--r-full);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 1.5rem;
        }

        .msg-icon.success {
            background: #ecfdf5;
            color: #059669;
        }

        .msg-icon.error {
            background: #fef2f2;
            color: #dc2626;
        }

        .msg-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 4px;
        }

        .msg-text {
            font-size: 0.85rem;
            color: var(--gray-500);
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .app-header {
                padding: var(--sp-sm) var(--sp-md);
            }

            .header-inner {
                gap: 10px;
            }

            .header-logo {
                width: 36px;
                height: 36px;
            }

            .header-title {
                font-size: 1.1rem;
            }

            .app-body {
                padding: var(--sp-md);
            }

            .form-body {
                padding: 18px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .emp-info-bar {
                flex-direction: column;
                text-align: center;
            }

            .history-card {
                overflow-x: auto;
            }

            .history-table {
                min-width: 480px;
            }
        }

        @media (max-width: 480px) {
            .app-header {
                padding: var(--sp-xs) var(--sp-sm);
            }

            .header-title {
                font-size: 0.95rem;
            }

            .app-body {
                padding: var(--sp-sm);
            }

            .form-body {
                padding: 14px;
            }
        }

        /* ── THEME TOGGLE ── */
        .theme-toggle {
            margin-left: auto;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            color: #fff;
            padding: 0;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── DARK MODE CONTENT OVERRIDES ── */
        [data-theme="dark"] #app {
            background: #0d1b2a !important;
        }

        [data-theme="dark"] body {
            background: #0d1b2a !important;
        }

        [data-theme="dark"] .app-body {
            background: #0d1b2a !important;
        }

        [data-theme="dark"] .header-title {
            color: #ffffff !important;
        }

        [data-theme="dark"] .header-datetime {
            color: #93c5fd !important;
        }

        [data-theme="dark"] .form-card {
            background: #162032 !important;
            border-color: #1e3050 !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3) !important;
        }

        [data-theme="dark"] .emp-info-bar {
            background: #1e3050 !important;
            border-color: #2a4060 !important;
        }

        [data-theme="dark"] .emp-name {
            color: #e2e8f0 !important;
        }

        [data-theme="dark"] .emp-id {
            color: #94a3b8 !important;
        }

        [data-theme="dark"] .form-label {
            color: #94a3b8 !important;
        }

        [data-theme="dark"] .form-input,
        [data-theme="dark"] .form-select,
        [data-theme="dark"] .form-textarea {
            background: #0d1b2a !important;
            border-color: #1e3050 !important;
            color: #e2e8f0 !important;
        }

        [data-theme="dark"] .form-input::placeholder,
        [data-theme="dark"] .form-textarea::placeholder {
            color: #475569 !important;
        }

        [data-theme="dark"] .history-card {
            background: #162032 !important;
            border-color: #1e3050 !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3) !important;
        }

        [data-theme="dark"] .history-header {
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .history-header h3 {
            color: #e2e8f0 !important;
        }

        [data-theme="dark"] .history-count {
            background: #1e3050 !important;
            color: #93c5fd !important;
        }

        [data-theme="dark"] .history-table th {
            background: #0d1b2a !important;
            color: #94a3b8 !important;
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .history-table td {
            color: #cbd5e1 !important;
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .history-table tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02) !important;
        }

        [data-theme="dark"] .empty-history {
            color: #64748b !important;
        }

        [data-theme="dark"] .submit-btn {
            color: #ffffff !important;
        }

        [data-theme="dark"] .msg-card {
            background: #162032 !important;
            border-color: #1e3050 !important;
        }

        [data-theme="dark"] .msg-title {
            color: #e2e8f0 !important;
        }

        [data-theme="dark"] .msg-text {
            color: #94a3b8 !important;
        }

        [data-theme="dark"] .loading-overlay {
            background: rgba(0, 0, 0, 0.92) !important;
        }

        [data-theme="dark"] .msg-overlay {
            background: rgba(0, 0, 0, 0.7) !important;
        }

        [data-theme="dark"] .header-logo {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        [data-theme="dark"] [class*="footer"] {
            background: #0d1b2a !important;
            border-color: #1e3050 !important;
            color: #64748b !important;
        }

        @media (max-width: 480px) {
            .header-inner {
                gap: 8px !important;
                padding: 0 !important;
                flex-wrap: nowrap;
            }

            .header-logo {
                width: 32px !important;
                height: 32px !important;
                min-width: 32px !important;
                border-radius: 8px !important;
            }

            .header-title {
                font-size: 0.82rem !important;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 140px;
            }

            .header-datetime {
                font-size: 0.6rem !important;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 140px;
            }

            .theme-toggle {
                width: 30px !important;
                height: 30px !important;
                min-width: 30px !important;
                border-radius: 8px !important;
            }

            .theme-toggle svg {
                width: 14px !important;
                height: 14px !important;
            }
        }
    </style>
    <script src="../js/rdr-auth.js"></script>
    <script src="../js/rdr-api.js"></script>
    <script>
        // Provide template-compatible variables from session
        var USER_EMAIL = RDR_AUTH.getEmail();
        var SESSION_TOKEN = RDR_AUTH.getSession();
        var BASE_URL = RDR_AUTH.getGasUrl();
        var userEmail = USER_EMAIL;
        var sessionToken = SESSION_TOKEN;
        var baseUrl = BASE_URL;
    </script>
</head>

<body>
    <div id="app">
        <header class="app-header">
            <div class="header-inner">
                <a id="backToPortal" onclick="window.location.href=this.getAttribute('data-url');return false;"
                    data-url="#"
                    style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:10px;color:#fff;text-decoration:none;cursor:pointer;flex-shrink:0;"
                    href="javascript:void(0)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                    </svg>
                </a>
                <div class="header-logo"><img id="headerLogo"
                        src="https://i.ibb.co/zVsd2Mgk/RDR-Business-Solutions-proper-Blue.png" alt="RDR" /></div>
                <div class="header-text">
                    <h1 class="header-title">WFH Filing</h1>
                    <p class="header-datetime" id="headerDateTime">Loading...</p>
                </div>
            </div>
            <div style="position:absolute;top:50%;right:16px;transform:translateY(-50%);z-index:10;">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg id="themeIcon" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <div class="app-body">
            <div class="body-inner">
                <div class="form-card">
                    <div class="form-header">
                        <h2>🏠 WFH Filing</h2>
                        <p>Submit your work-from-home request</p>
                    </div>
                    <div class="form-body">
                        <div class="emp-info-bar" id="empBar" style="display:none;">
                            <div class="emp-avatar" id="empAvatar"></div>
                            <div class="emp-details">
                                <div class="emp-name" id="empName"></div>
                                <div class="emp-id" id="empId"></div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Date From</label>
                                <input type="date" class="form-input" id="dateFrom" />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Date To</label>
                                <input type="date" class="form-input" id="dateTo" />
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Reason / Remarks</label>
                            <textarea class="form-textarea" id="reason"
                                placeholder="Brief reason for WFH request..."></textarea>
                        </div>

                        <button class="submit-btn" id="submitBtn" onclick="submitForm()" disabled>Submit WFH
                            Filing</button>
                    </div>
                </div>

                <div class="history-card">
                    <div class="history-header">
                        <h3>📋 My WFH Filings</h3>
                        <span class="history-count" id="historyCount">0</span>
                    </div>
                    <div id="historyBody">
                        <div class="empty-history" id="emptyHistory">
                            <div class="empty-history-icon">📂</div>
                            <p>No WFH filings yet</p>
                        </div>
                        <table class="history-table" id="historyTable" style="display:none;">
                            <thead>
                                <tr>
                                    <th>Date From</th>
                                    <th>Date To</th>
                                    <th>Reason</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="historyTbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div style="text-align:center;padding:16px 24px 24px;font-size:11px;color:var(--gray-400);line-height:1.8;">
            Created by: <strong>Joeross Delos Reyes</strong><br>
            Need help? Contact <a href="https://t.me/moverings" target="_blank"
                style="color:var(--teal-400);text-decoration:none;font-weight:600;">@moverings</a> on Telegram or reach
            out to IT Operations
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p class="loading-text" id="loadingText">Processing...</p>
        </div>
    </div>

    <div class="msg-overlay" id="msgOverlay">
        <div class="msg-card">
            <div class="msg-icon" id="msgIcon">✓</div>
            <div class="msg-title" id="msgTitle"></div>
            <div class="msg-text" id="msgText"></div>
        </div>
    </div>

    <script>
        var USER_EMAIL = '' + RDR_AUTH.getEmail() + '';
        var SESSION_TOKEN = '' + RDR_AUTH.getSession() + '';
        var BASE_URL = '' + RDR_AUTH.getGasUrl() + '';
        var currentEmployee = null;

        function updateClock() {
            var now = new Date();
            var opts = { timeZone: 'Asia/Manila', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('headerDateTime').textContent = now.toLocaleString('en-PH', opts);
        }

        document.addEventListener('DOMContentLoaded', function () {
            updateClock(); setInterval(updateClock, 1000);
            document.getElementById('backToPortal').setAttribute('data-url', './');
            document.getElementById('msgOverlay').addEventListener('click', hideMsgOverlay);

            callGAS('split', [',']).then(function (result) {
                    if (result && result.success && result.employee) {
                        currentEmployee = result.employee;
                        var emp = result.employee;
                        var names = emp.empName.split(','););
                        var initials = (names.length >= 2) ? names[1].trim().charAt(0) + names[0].trim().charAt(0) : emp.empName.substring(0, 2);
                        document.getElementById('empAvatar').textContent = initials.toUpperCase();
                        document.getElementById('empName').textContent = emp.empName;
                        document.getElementById('empId').textContent = 'ID: ' + emp.empId;
                        document.getElementById('empBar').style.display = 'flex';
                        document.getElementById('submitBtn').disabled = false;
                    }
                })
                .withFailureHandler(function () { })
                .lookupEmployeeByEmail(USER_EMAIL);

            loadHistory();
        });

        function loadHistory() {
            callGAS('getElementById', ['historyTbody']).then(function (result) {
                    if (!result || !result.success) return;
                    var filings = result.filings || [];
                    document.getElementById('historyCount').textContent = filings.length;
                    if (filings.length === 0) {
                        document.getElementById('emptyHistory').style.display = 'block';
                        document.getElementById('historyTable').style.display = 'none';
                        return;
                    }
                    document.getElementById('emptyHistory').style.display = 'none';
                    document.getElementById('historyTable').style.display = 'table';
                    var tbody = document.getElementById('historyTbody'););
                    tbody.innerHTML = '';
                    for (var i = filings.length - 1; i >= 0; i--) {
                        var f = filings[i];
                        var statusClass = String(f.status).toLowerCase() === 'approved' ? 'approved' : (String(f.status).toLowerCase() === 'disapproved' ? 'disapproved' : 'pending');
                        var reasonText = f.reason.length > 30 ? f.reason.substring(0, 30) + '…' : f.reason;
                        var tr = document.createElement('tr');
                        tr.innerHTML = '<td>' + f.dateFrom + '</td><td>' + f.dateTo + '</td><td title="' + f.reason + '">' + reasonText + '</td><td><span class="status-badge ' + statusClass + '">' + f.status + '</span></td>';
                        tbody.appendChild(tr);
                    }
                })
                .withFailureHandler(function () { })
                .getMyWFHFilings(USER_EMAIL);
        }

        function submitForm() {
            if (!currentEmployee) return;
            var dateFrom = document.getElementById('dateFrom').value;
            var dateTo = document.getElementById('dateTo').value;
            var reason = document.getElementById('reason').value;

            if (!dateFrom || !dateTo || !reason.trim()) {
                showMessage('error', 'Missing Fields', 'Please fill in all fields including reason/remarks.');
                return;
            }

            if (new Date(dateTo) < new Date(dateFrom)) {
                showMessage('error', 'Invalid Dates', '"Date To" cannot be earlier than "Date From".');
                return;
            }

            showLoading('Submitting WFH filing...');
            document.getElementById('submitBtn').disabled = true;

            callGAS('submitWFHFiling', [currentEmployee.empId, currentEmployee.empName, dateFrom, dateTo, reason]).then(function (result) {
                    hideLoading();
                    if (result.success) {
                        showMessage('success', 'Submitted!', result.message);
                        document.getElementById('dateFrom').value = '';
                        document.getElementById('dateTo').value = '';
                        document.getElementById('reason').value = '';
                        loadHistory();
                    } else {
                        showMessage('error', 'Failed', result.error);
                    }
                    document.getElementById('submitBtn').disabled = false;
                }).catch(function (err) {
                    hideLoading();
                    showMessage('error', 'Error', err.message || 'Server error.');
                    document.getElementById('submitBtn').disabled = false;
                });
        }

        function showLoading(text) { document.getElementById('loadingText').textContent = text || 'Processing...'; document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        function showMessage(type, title, text) {
            var icon = document.getElementById('msgIcon');
            icon.className = 'msg-icon ' + type;
            icon.textContent = type === 'success' ? '✓' : '✕';
            document.getElementById('msgTitle').textContent = title;
            document.getElementById('msgText').textContent = text;
            document.getElementById('msgOverlay').classList.add('active');
        }
        function hideMsgOverlay() { document.getElementById('msgOverlay').classList.remove('active'); }

        // ── THEME TOGGLE ──
        (function () {
            var LOGO_LIGHT = 'https://i.ibb.co/zVsd2Mgk/RDR-Business-Solutions-proper-Blue.png';
            var LOGO_DARK = 'https://i.ibb.co/6crnBjPv/RDR-Logo-White.png';
            var saved = 'light';
            try { saved = localStorage.getItem('rdr-theme') || 'light'; } catch (e) { }
            document.documentElement.setAttribute('data-theme', saved);
            function updateIcon() {
                var el = document.getElementById('themeIcon');
                if (!el) return;
                var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                el.innerHTML = isDark
                    ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'
                    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
                var logo = document.getElementById('headerLogo');
                if (logo) logo.src = isDark ? LOGO_DARK : LOGO_LIGHT;
            }
            updateIcon();
            var btn = document.getElementById('themeToggle');
            if (btn) btn.addEventListener('click', function () {
                var current = document.documentElement.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                try { localStorage.setItem('rdr-theme', next); } catch (e) { }
                updateIcon();
            });
        })();
    </script>
</body>

</html>
